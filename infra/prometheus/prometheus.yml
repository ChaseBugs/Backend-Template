global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ecommerce-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:3000
          - 127.0.0.1:3001
          - 127.0.0.1:3002
          - 127.0.0.1:3003
          - 127.0.0.1:3004
          - 127.0.0.1:3005
          - 127.0.0.1:3006
          - 127.0.0.1:3007
          - 127.0.0.1:3008
          - 127.0.0.1:3009
          - 127.0.0.1:3010
          - 127.0.0.1:3011
          - 127.0.0.1:3012
  - job_name: redis-exporter
    static_configs:
      - targets: [127.0.0.1:9121]
  - job_name: kafka-exporter
    static_configs:
      - targets: [127.0.0.1:9308]
