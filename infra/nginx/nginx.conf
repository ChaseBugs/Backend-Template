user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;

events {
  worker_connections 10240;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time '
                  'us=$upstream_response_time uid=$http_x_user_id';

  access_log /var/log/nginx/access.log main buffer=16k flush=5s;
  error_log  /var/log/nginx/error.log warn;

  # Performance
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  75s;
  keepalive_requests 1000;
  server_tokens      off;

  # Compression
  gzip            on;
  gzip_comp_level 4;
  gzip_min_length 1024;
  gzip_types      application/json text/plain text/css application/javascript;

  # Buffers
  client_max_body_size     10m;
  client_body_buffer_size  128k;
  proxy_buffer_size        16k;
  proxy_buffers            4 32k;
  proxy_busy_buffers_size  64k;

  # Rate limit zones
  limit_req_zone $binary_remote_addr zone=global:20m  rate=300r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m    rate=20r/m;
  limit_req_zone $binary_remote_addr zone=search:10m  rate=60r/m;
  limit_req_status 429;

  # Upstream: API Gateway cluster
  upstream api_gateway {
    least_conn;
    keepalive 128;
    server 127.0.0.1:3000;
    # add more nodes as needed:
    # server 192.168.1.11:3000;
    # server 192.168.1.12:3000;
  }

  # HTTP → HTTPS redirect
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    return 301 https://$host$request_uri;
  }

  # HTTPS main server
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Auth endpoints — strict rate limit
    location ~ ^/api/v1/auth/(login|register) {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass         http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # Search endpoints — moderate rate limit
    location /api/v1/search {
      limit_req zone=search burst=10 nodelay;
      proxy_pass         http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_pragma;
      proxy_read_timeout 10s;
    }

    # All other API routes
    location /api/ {
      limit_req zone=global burst=50 nodelay;
      proxy_pass         http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_connect_timeout 5s;
    }

    # Health check (no rate limit, no auth)
    location /health {
      proxy_pass http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      access_log off;
    }

    location = /favicon.ico { return 204; access_log off; }
    location = /robots.txt  { return 200 "User-agent: *\nDisallow: /\n"; access_log off; }
  }
}
