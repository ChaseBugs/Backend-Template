<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eCommerce Demo</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- ─── Navigation ─────────────────────────────── -->
  <header class="navbar">
    <div class="nav-inner">
      <a class="logo" href="#/" onclick="navigate('/')">🛒 eCommerce Demo</a>
      <nav class="nav-links">
        <a href="#/" onclick="navigate('/')">상품</a>
        <a href="#/search" onclick="navigate('/search')">검색</a>
        <span id="nav-cart" class="nav-cart-link" onclick="navigate('/cart')" style="display:none">
          장바구니 <span id="cart-badge" class="badge">0</span>
        </span>
        <span id="nav-orders" onclick="navigate('/orders')" style="display:none">내 주문</span>
        <span id="nav-agent" onclick="navigate('/agent')" style="display:none">내 상품</span>
        <span id="nav-admin" onclick="navigate('/admin')" style="display:none">관리</span>
        <span id="nav-user" class="nav-user" onclick="navigate('/profile')" style="display:none"></span>
        <button id="nav-login-btn" class="btn btn-sm" onclick="navigate('/login')">로그인</button>
        <button id="nav-logout-btn" class="btn btn-sm btn-outline" onclick="logout()" style="display:none">로그아웃</button>
      </nav>
    </div>
  </header>

  <!-- ─── Toast ──────────────────────────────────── -->
  <div id="toast" class="toast"></div>

  <!-- ─── Pages ──────────────────────────────────── -->
  <main id="app"></main>

  <script src="/app.js"></script>
</body>
</html>
